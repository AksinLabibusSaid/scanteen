<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selamat Datang - Canteen Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap");

      * {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
      }

      :root {
        --maroon: #800000;
        --salmon: #ff8371;
      }

      .bg-maroon {
        background-color: var(--maroon);
      }

      .text-salmon {
        color: var(--salmon);
      }

      .text-maroon {
        color: var(--maroon);
      }

      .border-salmon {
        border-color: var(--salmon);
      }

      button.role-btn {
        transition: all 0.2s ease;
      }

      button.role-btn.active {
        background-color: var(--maroon);
        border-color: var(--maroon);
        color: white;
      }

      button.role-btn.active svg {
        color: white;
      }

      button.role-btn:not(.active):hover {
        border-color: rgba(128, 0, 0, 0.4);
      }

      input:focus {
        border-color: var(--maroon);
        outline: none;
        box-shadow: 0 0 0 3px rgba(128, 0, 0, 0.1);
      }

      .btn-login {
        background-color: var(--maroon);
        box-shadow:
          0 10px 15px -3px rgba(128, 0, 0, 0.2),
          0 4px 6px -4px rgba(128, 0, 0, 0.2);
        transition: all 0.2s ease;
      }

      .btn-login:hover {
        background-color: rgba(128, 0, 0, 0.9);
      }

      .btn-login:active {
        background-color: rgba(128, 0, 0, 0.8);
      }

      .img-overlay {
        opacity: 0.3;
        mix-blend-mode: overlay;
        background-color: #000;
      }

      .pwd-toggle {
        transition: color 0.2s ease;
      }

      .pwd-toggle:hover {
        color: var(--maroon);
      }
    </style>
  </head>

          <!-- Bottom branding content -->

                Modern Culinary Efficiency

            </div>

    <script>
      // Role selection
      const roleButtons = document.querySelectorAll(".role-btn");
      roleButtons.forEach((btn) => {
        btn.addEventListener("click", function () {
          roleButtons.forEach((b) => b.classList.remove("active"));
          this.classList.add("active");
        });
      });

      // Password visibility toggle
      const passwordInput = document.getElementById("password-input");
      const toggleBtn = document.getElementById("pwd-toggle-btn");

      toggleBtn.addEventListener("click", function () {
        if (passwordInput.type === "password") {
          passwordInput.type = "text";
        } else {
          passwordInput.type = "password";
        }
      });
    </script>
